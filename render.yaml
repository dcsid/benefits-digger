services:
  - type: web
    name: benefits-digger
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: BENEFITS_DIGGER_GEMINI_API_KEY
        sync: false
      - key: BENEFITS_DIGGER_GEMINI_MODEL
        value: gemini-3-pro-preview
      - key: BENEFITS_DIGGER_GEMINI_STRUCTURED_TEMPERATURE
        value: "0.3"
      - key: BENEFITS_DIGGER_GEMINI_CHAT_TEMPERATURE
        value: "0.7"
      - key: BENEFITS_DIGGER_GEMINI_SEARCH_GROUNDING_ENABLED
        value: "true"
      - key: BENEFITS_DIGGER_AUTO_SYNC_REMOTE
        value: "true"
