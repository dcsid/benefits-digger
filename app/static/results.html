<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="page.resultsTitle">Results - Benefits Digger</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>
  </head>
  <body>
    <main class="layout">
      <nav class="nav-bar wide">
        <a href="/" class="nav-link" data-i18n="nav.home">Home</a>
        <a href="/dashboard" class="nav-link" data-i18n="nav.dashboard">Dashboard</a>
        <a href="/results" class="nav-link nav-link--active" id="nav-results" aria-current="page" data-i18n="nav.results">Results</a>
        <!-- <a href="/whatif" class="nav-link" data-i18n="nav.whatif">What-If Lab</a> -->
        <a href="/explorer" class="nav-link" data-i18n="nav.explorer">Explorer</a>
        <select id="lang-select" class="lang-select" onchange="loadLocale(this.value)">
          <option value="en" data-i18n="lang.en">English</option>
          <option value="es" data-i18n="lang.es">Español</option>
        </select>
      </nav>

      <section class="panel wide" id="results-section">
        <div class="row spread">
          <h2 data-i18n="results.title">Results</h2>
          <div class="row">
            <span id="result-count" class="pill">0 live matches</span>
            <button type="button" id="export-results" class="ghost" data-i18n="results.print">Print</button>
            <button type="button" id="download-pdf" class="ghost" data-i18n="results.downloadPdf">Download PDF</button>
          </div>
        </div>
        <div id="no-session" class="empty empty-cta hidden">
          <p data-i18n="results.noSession">No active session. <a href="/">Start a screening</a> first.</p>
        </div>
        <div id="results-grid" class="results-grid">
          <div id="federal-results-column">
            <h3 data-i18n="results.federalTitle">Federal Results</h3>
            <div id="federal-results" class="result-list empty" data-i18n="results.noFederal">No federal results yet.</div>
          </div>
          <div id="state-results-column">
            <h3 data-i18n="results.stateTitle">State Results</h3>
            <div id="state-results" class="result-list empty" data-i18n="results.noState">No state results yet.</div>
          </div>
        </div>
      </section>
    </main>
    <script src="/static/shared.js" defer></script>
    <script src="/static/results-page.js" defer></script>
  </body>
</html>
